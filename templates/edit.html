<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://jsdelivr.net" rel="stylesheet">
    <title>Editar Proyecto</title>
</head>
<body class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white"><h5>Editar Registro #{{ tarea['id'] }}</h5></div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control" value="{{ tarea['nombre'] }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea name="descripcion" class="form-control" rows="3" required>{{ tarea['descripcion'] }}</textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Prioridad</label>
                    <select name="prioridad" class="form-select">
                        <option value="Baja" {{ 'selected' if tarea['prioridad'] == 'Baja' }}>Baja</option>
                        <option value="Media" {{ 'selected' if tarea['prioridad'] == 'Media' }}>Media</option>
                        <option value="Alta" {{ 'selected' if tarea['prioridad'] == 'Alta' }}>Alta</option>
                    </select>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">Actualizar</button>
                    <a href="/" class="btn btn-light border">Volver</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
