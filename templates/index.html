<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://jsdelivr.net" rel="stylesheet">
    <title>Panel de Ingeniería</title>
</head>
<body class="container mt-4">
    <h2 class="mb-3 text-primary">🛠️ Gestión de Proyectos</h2>
    
    <!-- Buscador -->
    <form action="/" method="GET" class="d-flex mb-4">
        <input type="text" name="search" class="form-control me-2" placeholder="Buscar proyecto...">
        <button type="submit" class="btn btn-secondary">Buscar</button>
    </form>

    <!-- Formulario de Registro -->
    <form action="/add" method="POST" class="row g-2 mb-4 p-3 bg-light border rounded shadow-sm">
        <div class="col-12 col-md-4"><input type="text" name="nombre" class="form-control" placeholder="Nombre" required></div>
        <div class="col-12 col-md-4"><input type="text" name="descripcion" class="form-control" placeholder="Descripción" required></div>
        <div class="col-6 col-md-2">
            <select name="prioridad" class="form-select">
                <option value="Baja">Baja</option>
                <option value="Media" selected>Media</option>
                <option value="Alta">Alta</option>
            </select>
        </div>
        <div class="col-6 col-md-2"><button type="submit" class="btn btn-primary w-100">Añadir</button></div>
    </form>

    <!-- Tabla Responsiva -->
    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Proyecto</th><th>Prioridad</th><th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for t in tareas %}
                <tr>
                    <td>
                        <strong>{{ t['nombre'] }}</strong><br>
                        <small class="text-muted">{{ t['descripcion'] }}</small>
                    </td>
                    <td><span class="badge {{ 'bg-danger' if t['prioridad'] == 'Alta' else 'bg-warning text-dark' if t['prioridad'] == 'Media' else 'bg-success' }}">{{ t['prioridad'] }}</span></td>
                    <td>
                        <div class="btn-group">
                            <a href="/edit/{{ t['id'] }}" class="btn btn-outline-primary btn-sm">✎</a>
                            <a href="/delete/{{ t['id'] }}" class="btn btn-outline-danger btn-sm" onclick="return confirm('¿Eliminar?')">🗑</a>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
